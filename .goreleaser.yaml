version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: invoicer
    main: ./cmd/invoicer
    binary: invoicer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: invoicer
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - config.example.yaml
      - LICENSE
      - README.md

brews:
  - name: invoicer
    repository:
      owner: OPPF-IHQ-IT
      name: homebrew-invoicer
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/OPPF-IHQ-IT/invoicer"
    description: "Automate fraternity dues invoicing via Airtable and QuickBooks Online."
    license: "MIT"
    install: |
      bin.install "invoicer"
    test: |
      system "#{bin}/invoicer", "--help"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
